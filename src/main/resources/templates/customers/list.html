<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Bocaditos LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>
    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>

        <section class="panel">
            <div class="section-toolbar">
                <form class="search-form" th:action="@{/customers}" method="get">
                    <input type="search" name="q" placeholder="Search customers or organizations" th:value="${searchQuery}">
                    <button type="submit">Search</button>
                </form>
                <a class="primary-link" th:href="@{/customers/new}">Add customer</a>
            </div>

            <div class="summary-strip">
                <article>
                    <strong th:text="${customers.size()}">0</strong>
                    <span>Customer records</span>
                </article>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Orders</th>
                        <th>Lifetime sales</th>
                        <th>Contact</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="customer : ${customers}">
                        <td>
                            <a class="table-title" th:href="@{/customers/{id}(id=${customer.id()})}" th:text="${customer.fullName()}">Name</a>
                        </td>
                        <td th:text="${customer.orderCount()}">0</td>
                        <td th:text="${'$' + #numbers.formatDecimal(customer.lifetimeSales(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                        <td>
                            <div th:text="${customer.phone()} ?: 'No phone on file'">Phone</div>
                            <small th:text="${customer.email()} ?: 'No email on file'">Email</small>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="4" class="empty-state">No customers match the current search.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
