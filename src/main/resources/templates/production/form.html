<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Production Session | Bocaditos LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>
    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>
        <section class="panel form-panel">
            <form th:action="@{/production}" th:object="${sessionForm}" method="post" class="entity-form">
                <div th:if="${#fields.hasGlobalErrors()}" class="flash-banner field-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">Error</div>
                <div class="form-grid">
                    <label><span>Date</span><input type="date" th:field="*{productionDate}"></label>
                    <label><span>Units produced</span><input type="number" min="0" th:field="*{unitsProduced}"></label>
                    <label><span>Start time</span><input type="time" th:field="*{startTime}"></label>
                    <label><span>End time</span><input type="time" th:field="*{endTime}"><small class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}">Error</small></label>
                    <label><span>Session labor rate</span><input type="number" min="0" step="0.01" th:field="*{hourlyLaborRate}"></label>
                    <label><span>Other cost</span><input type="number" min="0" step="0.01" th:field="*{otherCost}"></label>
                </div>
                <section class="line-item-section">
                    <div class="section-toolbar compact"><div><p class="panel-eyebrow">Workers</p><h3>Labor entries</h3></div></div>
                    <div class="line-item-grid" th:each="worker, workerStat : *{workers}">
                        <div class="line-item-card">
                            <div class="form-grid three-col">
                                <label><span>Worker</span><select th:field="*{workers[__${workerStat.index}__].workerId}"><option value="">Select worker</option><option th:each="option : ${formOptions.workers()}" th:value="${option.id()}" th:text="${option.label() + ' ($' + option.defaultRate() + '/hr)'}">Worker</option></select></label>
                                <label><span>Hours worked</span><input type="number" min="0" step="0.25" th:field="*{workers[__${workerStat.index}__].hoursWorked}"></label>
                                <label><span>Hourly rate</span><input type="number" min="0" step="0.01" th:field="*{workers[__${workerStat.index}__].hourlyRate}"></label>
                            </div>
                        </div>
                    </div>
                </section>
                <label class="full-width"><span>Notes</span><textarea th:field="*{notes}" rows="4" placeholder="Batch focus, prep issues, or staffing notes."></textarea></label>
                <div class="form-actions"><a class="secondary-link" th:href="@{/production}">Cancel</a><button class="primary-link" type="submit">Save session</button></div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
