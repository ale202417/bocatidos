<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Session | Bocaditos LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>
    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>
        <div th:if="${flashMessage}" class="flash-banner" th:text="${flashMessage}">Saved</div>
        <section class="detail-grid">
            <article class="panel">
                <div class="detail-header">
                    <div><p class="panel-eyebrow">Session overview</p><h3 th:text="${#temporals.format(session.productionDate(), 'MMM dd, yyyy')}">Date</h3></div>
                </div>
                <div class="info-list">
                    <div><span>Start</span><strong th:text="${session.startTime()}">08:00</strong></div>
                    <div><span>End</span><strong th:text="${session.endTime()}">12:00</strong></div>
                    <div><span>Units</span><strong th:text="${session.unitsProduced()}">0</strong></div>
                    <div><span>Units/hour</span><strong th:text="${session.unitsPerHour()}">0.00</strong></div>
                </div>
                <p class="detail-notes" th:text="${session.notes()} ?: 'No production notes added yet.'">Notes</p>
            </article>
            <article class="panel">
                <p class="panel-eyebrow">Efficiency summary</p>
                <div class="summary-metrics">
                    <div><span>Labor hours</span><strong th:text="${session.laborHours()}">0.00</strong></div>
                    <div><span>Labor cost</span><strong th:text="${'$' + #numbers.formatDecimal(session.laborCost(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Other cost</span><strong th:text="${'$' + #numbers.formatDecimal(session.otherCost(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Cost per unit</span><strong th:text="${'$' + #numbers.formatDecimal(session.costPerUnit(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                </div>
                <div class="form-actions">
                    <a class="secondary-link" th:href="@{/production}">Back to production</a>
                    <form th:action="@{/production/{id}/delete(id=${session.id()})}" method="post">
                        <button class="danger-link" type="submit">Delete session</button>
                    </form>
                </div>
            </article>
        </section>
        <section class="panel">
            <div class="section-toolbar"><div><p class="panel-eyebrow">Workers</p><h3>Who worked this session</h3></div><a class="secondary-link" th:href="@{/production}">Back to production</a></div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead><tr><th>Worker</th><th>Hours</th><th>Rate</th><th>Labor cost</th></tr></thead>
                    <tbody>
                    <tr th:each="worker : ${session.workers()}">
                        <td th:text="${worker.workerName()}">Worker</td>
                        <td th:text="${worker.hoursWorked()}">0.00</td>
                        <td th:text="${'$' + #numbers.formatDecimal(worker.hourlyRate(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                        <td th:text="${'$' + #numbers.formatDecimal(worker.laborCost(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
