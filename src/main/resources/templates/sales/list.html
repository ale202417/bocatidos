<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders & Sales | Bocaditos LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>
    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>
        <div th:if="${flashMessage}" class="flash-banner" th:text="${flashMessage}">Saved</div>

        <section class="panel">
            <div class="section-toolbar">
                <form class="search-form" th:action="@{/sales}" method="get">
                    <input type="search" name="q" placeholder="Search by order number, partner, or customer" th:value="${searchQuery}">
                    <button type="submit">Search</button>
                </form>
                <a class="primary-link" th:href="@{/sales/new}">New order</a>
            </div>

            <div class="summary-strip">
                <article>
                    <strong th:text="${orders.size()}">0</strong>
                    <span>Orders in view</span>
                </article>
                <article>
                    <strong th:text="${#lists.size(orders.?[paymentStatus.name() == 'UNPAID' || paymentStatus.name() == 'PARTIALLY_PAID'])}">0</strong>
                    <span>Orders needing follow-up</span>
                </article>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Order</th>
                        <th>Date</th>
                        <th>Owner</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Paid</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td>
                            <a class="table-title" th:href="@{/sales/{id}(id=${order.id()})}" th:text="${order.orderNumber()}">SO-1001</a>
                            <small th:text="${order.itemCount()} + ' line items'">0 line items</small>
                        </td>
                        <td th:text="${#temporals.format(order.orderDate(), 'MMM dd, yyyy')}">Mar 27, 2026</td>
                        <td th:text="${order.partnerName()}">Partner</td>
                        <td th:text="${order.customerName()}">Customer</td>
                        <td>
                            <span class="status-badge" th:classappend="${order.paymentStatus().name() == 'PAID'} ? ' paid' : (${order.paymentStatus().name() == 'PARTIALLY_PAID'} ? ' partial' : ' unpaid')"
                                  th:text="${order.paymentStatus()}">PAID</span>
                        </td>
                        <td th:text="${'$' + #numbers.formatDecimal(order.totalAmount(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                        <td th:text="${'$' + #numbers.formatDecimal(order.amountPaid(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="7" class="empty-state">No orders match the current search.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
