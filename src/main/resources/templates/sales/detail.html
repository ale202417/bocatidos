<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details | Bocaditos LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>
    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>

        <div th:if="${flashMessage}" class="flash-banner" th:text="${flashMessage}">Saved</div>

        <section class="detail-grid">
            <article class="panel">
                <div class="detail-header">
                    <div>
                        <p class="panel-eyebrow">Order overview</p>
                        <h3 th:text="${order.orderNumber()}">SO-1001</h3>
                    </div>
                    <span class="status-badge" th:classappend="${order.paymentStatus().name() == 'PAID'} ? ' paid' : (${order.paymentStatus().name() == 'PARTIALLY_PAID'} ? ' partial' : ' unpaid')"
                          th:text="${order.paymentStatus()}">PAID</span>
                </div>
                <div class="info-list">
                    <div><span>Order date</span><strong th:text="${#temporals.format(order.orderDate(), 'MMM dd, yyyy')}">-</strong></div>
                    <div><span>Partner</span><strong th:text="${order.partnerName()}">-</strong></div>
                    <div><span>Customer</span><strong th:text="${order.customerName()}">-</strong></div>
                </div>
                <p class="detail-notes" th:text="${order.notes()} ?: 'No order notes added yet.'">Notes</p>
            </article>

            <article class="panel">
                <p class="panel-eyebrow">Payment summary</p>
                <div class="summary-metrics">
                    <div><span>Subtotal</span><strong th:text="${'$' + #numbers.formatDecimal(order.subtotal(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Discount</span><strong th:text="${'$' + #numbers.formatDecimal(order.discountAmount(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Total</span><strong th:text="${'$' + #numbers.formatDecimal(order.totalAmount(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Paid</span><strong th:text="${'$' + #numbers.formatDecimal(order.amountPaid(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                    <div><span>Balance due</span><strong th:text="${'$' + #numbers.formatDecimal(order.balanceDue(), 1, 'COMMA', 2, 'POINT')}">$0.00</strong></div>
                </div>
            </article>
        </section>

        <section class="panel">
            <div class="section-toolbar">
                <div>
                    <p class="panel-eyebrow">Line items</p>
                    <h3>What was sold</h3>
                </div>
                <a class="secondary-link" th:href="@{/sales}">Back to orders</a>
            </div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Unit price</th>
                        <th>Line total</th>
                        <th>Notes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${order.items()}">
                        <td th:text="${item.itemName()}">Item</td>
                        <td th:text="${item.quantity()}">1</td>
                        <td th:text="${'$' + #numbers.formatDecimal(item.unitPrice(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                        <td th:text="${'$' + #numbers.formatDecimal(item.lineTotal(), 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                        <td th:text="${item.notes()} ?: 'No note'">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
