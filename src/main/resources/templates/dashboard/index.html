<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocaditos LLC Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeNav})}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/topbar :: topbar(${pageTitle}, ${pageSubtitle})}"></div>

        <section class="metrics-grid">
            <article class="metric-card" th:each="card : ${dashboard.metricCards()}">
                <div class="metric-card-header">
                    <p th:text="${card.label()}">Metric label</p>
                    <span class="trend-pill" th:classappend="${card.trendDirection()}" th:text="${card.trend()}">+0.0%</span>
                </div>
                <h3 th:text="${card.value()}">$0</h3>
                <small th:text="${card.helperText()}">Helper text</small>
            </article>
        </section>

        <section class="content-grid">
            <article class="panel panel-large">
                <div class="panel-header">
                    <div>
                        <p class="panel-eyebrow">Sales momentum</p>
                        <h3>Weekly revenue trend</h3>
                    </div>
                    <span class="panel-chip">Updated daily</span>
                </div>
                <canvas id="salesTrendChart"></canvas>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-eyebrow">Cost control</p>
                        <h3>Expense mix</h3>
                    </div>
                    <span class="panel-chip">Current month</span>
                </div>
                <canvas id="expenseChart"></canvas>
            </article>
        </section>

        <section class="content-grid">
            <article class="panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-eyebrow">Customer momentum</p>
                        <h3>Top customers</h3>
                    </div>
                </div>
                <ul class="metric-list">
                    <li th:each="customer : ${dashboard.topCustomers()}">
                        <strong th:text="${customer.label()}">Customer</strong>
                        <span th:text="${customer.value()}">$0.00</span>
                        <small th:text="${customer.helperText()}">Helper</small>
                    </li>
                </ul>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <div>
                        <p class="panel-eyebrow">Recent activity</p>
                        <h3>Snapshot feed</h3>
                    </div>
                </div>
                <ul class="activity-list">
                    <li th:each="activity : ${dashboard.recentActivity()}">
                        <strong th:text="${activity.title()}">Activity</strong>
                        <span th:text="${activity.description()}">Description</span>
                    </li>
                </ul>
            </article>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    window.dashboardData = {
        salesLabels: /*[[${dashboard.salesTrendLabels()}]]*/ [],
        salesValues: /*[[${dashboard.salesTrendValues()}]]*/ [],
        expenseLabels: /*[[${dashboard.expenseBreakdownLabels()}]]*/ [],
        expenseValues: /*[[${dashboard.expenseBreakdownValues()}]]*/ []
    };
</script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
