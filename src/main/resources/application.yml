spring:
  application:
    name: bocaditos-llc
  datasource:
    url: ${BOCADITOS_DB_URL:jdbc:mysql://localhost:3306/bocaditos_llc}
    username: ${BOCADITOS_DB_USERNAME:root}
    password: ${BOCADITOS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: demo
  datasource:
    url: jdbc:h2:mem:bocaditos_demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
